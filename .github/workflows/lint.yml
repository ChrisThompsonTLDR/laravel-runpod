name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Install dependencies (CI: exclude docit to avoid private package resolution)
        run: |
          composer config --unset repositories
          composer remove christhompsontldr/laravel-docit --dev --no-update
          composer update --no-interaction --prefer-dist

      - name: Run Pint
        run: ./vendor/bin/pint --test
